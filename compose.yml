services:
  mysql:
    image: 'mysql:8.4.7'
    container_name: tally-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tally_db}
      MYSQL_ROOT_PASSWORD: ${DATASOURCE_PASSWORD:?DATASOURCE_PASSWORD is required in .env}
      MYSQL_USER: ${DATASOURCE_USERNAME:-tally_user}
      MYSQL_PASSWORD: ${DATASOURCE_PASSWORD:?DATASOURCE_PASSWORD is required in .env}
    ports:
      - '3306:3306'
    volumes:
      - tally_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: tally-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-tally_db}
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME:-tally_user}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD:?DATASOURCE_PASSWORD is required in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.test}
      HIBERNATE_DDL: ${HIBERNATE_DDL:-update}
      SHOW_SQL: ${SHOW_SQL:-true}
      FORMAT_SQL: ${FORMAT_SQL:-true}
      FRONTEND_VERIFICATION_URL: ${FRONTEND_VERIFICATION_URL:-http://localhost:5173/verify}
    ports:
      - '8080:8080'

volumes:
  tally_data: